name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_url:
        description: 'PR URL to review (e.g., https://github.com/owner/repo/pull/123)'
        required: false
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd claude-review
          npm install

      - name: Build TypeScript
        run: |
          cd claude-review
          npm run build

      - name: Run Claude Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd claude-review
          
          if [ -n "${{ inputs.pr_url }}" ]; then
            PR_URL="${{ inputs.pr_url }}"
          else
            PR_URL="${{ github.event.pull_request.html_url }}"
          fi
          
          node dist/index.js --pr "$PR_URL" --post

      - name: Handle errors
        if: failure()
        run: |
          echo "Review failed. This may be due to missing API keys or network issues."
          echo "To use this action, ensure you have set ANTHROPIC_API_KEY in your repository secrets."
