name: Claude PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/review'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Claude PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python3 solutions/issue-4/claude-review.py --pr "$PR_URL" > review_output.md
          echo "review_output=$(cat review_output.md)" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('review_output.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '## 🤖 Claude Code PR Review\n\n' + output + '\n\n---\n*Generated by Claude Code PR Reviewer*'
            });
