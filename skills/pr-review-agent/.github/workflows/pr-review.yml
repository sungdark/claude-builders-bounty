name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Claude
        uses: anthropics/claude-code-action@v1
        with:
          tool: "read"

      - name: Run PR Review
        id: review
        run: |
          chmod +x pr-review.sh
          
          # Get PR info
          PR_URL="${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}"
          
          if [ -z "$PR_URL" ]; then
            echo "No PR URL found"
            exit 0
          fi
          
          # Run review
          bash pr-review.sh --pr "$PR_URL" --output pr-review.md
          
          echo "=== Generated Review ==="
          cat pr-review.md

      - name: Post Review Comment
        if: steps.review.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('pr-review.md', 'utf-8');
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });
