name: PR Reviewer

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Find PR URL from comment
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          echo "Comment: $COMMENT"
          PR_URL=$(echo "$COMMENT" | grep -oE 'https://github.com/[^/]+/[^/]+/pull/[0-9]+' | head -1)
          echo "Found PR: $PR_URL"
          echo "url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.parse.outputs.url != ''
        uses: actions/checkout@v4

      - name: Run PR Review
        if: steps.parse.outputs.url != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_URL: ${{ steps.parse.outputs.url }}
        run: |
          chmod +x scripts/claude-review
          ./scripts/claude-review --pr "$PR_URL" --output review.md

      - name: Post Review Comment
        if: steps.parse.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            const prUrl = process.env.PR_URL;
            const match = prUrl.match(/github\.com\/([^/]+)\/([^/]+)\/pull\/([0-9]+)/);
            github.rest.issues.createComment({
              issue_number: parseInt(match[3]),
              owner: match[1],
              repo: match[2],
              body: review
            });
